spring.application.name=cliniradar
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/cliniradar;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.mvc.async.request-timeout=180000

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

ollama.base-url=http://localhost:11434
ollama.model=mistral
ollama.connect-timeout-ms=5000
ollama.read-timeout-ms=120000
ollama.max-tokens=640
ollama.keep-alive=15m

pubmed.base-url=https://eutils.ncbi.nlm.nih.gov/entrez/eutils
pubmed.max-results=2

scielo.base-url=https://articlemeta.scielo.org/api/v1
scielo.collections=scl,spa
scielo.harvest-size=20
scielo.max-results=2

summary-cache.refresh-interval-ms=43200000
summary-cache.initial-delay-ms=15000

app.cors.allowed-origin-patterns=*
